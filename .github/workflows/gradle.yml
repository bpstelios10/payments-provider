# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle
name: spring-web-template Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build with Local Gradle Wrapper
        run: ./gradlew build # add -i for debug logs, in case of build failures

      - name: Publish Test Report
        if: always()
        run: |
          # 1. Convert JUnit XML to CTRF JSON using a standard npm tool
          npx junit-to-ctrf@v0.0.14 "**/build/test-results/test/*.xml" -u

          # 2. Publish to Job Summary using the CTRF CLI (Actionless way)
          npx github-actions-ctrf@0.0.58 ctrf/ctrf-report.json

