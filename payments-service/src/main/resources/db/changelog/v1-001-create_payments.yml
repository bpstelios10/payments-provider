databaseChangeLog:

  - changeSet:
      id: v1-001-create_payments
      author: stelios
      context: test,dev,prod

      preConditions:
        onFail: MARK_RAN
        onError: HALT
        not:
          tableExists:
            tableName: payments

      changes:
        - createTable:
            tableName: payments
            columns:
              - column:
                  name: payment_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_payments
              - column:
                  name: amount
                  type: DECIMAL(19,2)
              - column:
                  name: currency
                  type: VARCHAR(10)
              - column:
                  name: merchant_id
                  type: VARCHAR(255)
              - column:
                  name: idempotency_key
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: processing_started_at
                  type: TIMESTAMP
              - column:
                  name: created_date
                  type: TIMESTAMP
              - column:
                  name: updated_date
                  type: TIMESTAMP
        - addUniqueConstraint:
            tableName: payments
            columnNames: idempotency_key
            constraintName: UNIQUE_PAYMENT_IDEMPOTENCY_KEY
        - createIndex:
            tableName: payments
            indexName: idx_payments_status_processing_started
            columns:
              - column:
                  name: status
              - column:
                  name: processing_started_at
      rollback:
        - dropTable:
            tableName: payments
